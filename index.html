<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الهندسية المتكاملة | حساب كميات احترافي</title>
    
    <style>
        :root {
            --primary: #1e40af;
            --secondary: #0f172a;
            --accent: #fbbf24;
            --text: #1e293b;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #cbd5e1;
            --success: #059669;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); margin: 0; padding: 0; color: var(--text);
            line-height: 1.6;
        }

        header {
            background: var(--secondary); color: white;
            padding: 40px 20px 80px; text-align: center;
        }

        .container {
            max-width: 900px; margin: -50px auto 40px; padding: 0 15px;
        }

        .card {
            background: var(--white); border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px; margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .card h2 { 
            color: var(--primary); font-size: 1.3rem; 
            margin-top: 0; border-right: 4px solid var(--accent); padding-right: 10px;
        }

        .input-group { margin-bottom: 20px; }

        label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--secondary); }

        input, select {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 1rem; box-sizing: border-box;
        }

        .btn-calc {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }

        .btn-calc:hover { background: #152b75; }

        /* زر النسخ الجديد المحترم */
        .btn-copy-res {
            display: none; width: 100%; padding: 12px; background: var(--success);
            color: white; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            margin-top: 15px; text-align: center;
        }

        .results-box {
            display: none; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px; margin-top: 25px; background: #eff6ff;
            padding: 20px; border-radius: 12px; border: 1px dashed var(--primary);
        }

        .res-item { text-align: center; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .res-item span { display: block; font-size: 1.3rem; color: var(--primary); font-weight: bold; }
        .res-item small { font-size: 0.8rem; color: #64748b; }

        /* مساحة إعلانية نظيفة */
        .ad-banner-clean {
            margin: 20px 0; text-align: center; padding: 10px;
            background: #f1f5f9; border-radius: 8px; font-size: 0.8rem; color: #94a3b8;
        }

        footer { text-align: center; padding: 40px; color: #64748b; font-size: 0.9rem; }

        @media (min-width: 768px) {
            .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🏗️ المنصة الهندسية المتكاملة</h1>
    <p>دقة حسابية وفق المعايير الدولية</p>
</header>

<div class="container">
    
    <div class="ad-banner-clean">إعلان مقترح</div>

    <div class="card">
        <h2>📦 حاسبة كميات صب السقف</h2>
        <div class="grid-3">
            <div class="input-group">
                <label>مساحة السقف (م²)</label>
                <input type="number" id="c_area" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>نوع السقف</label>
                <select id="c_type">
                    <option value="solid">بلاطة عادية (Solid)</option>
                    <option value="flat">بلاطة هوردي (Flat)</option>
                </select>
            </div>
            <div class="input-group">
                <label>السمك (سم)</label>
                <input type="number" id="c_thick" placeholder="مثلاً: 15">
            </div>
        </div>
        <button class="btn-calc" onclick="calcConcrete()">احسب الكميات</button>
        
        <div class="results-box" id="c_results">
            <div class="res-item"><span id="r_vol">0</span><small>خرسانة (م³)</small></div>
            <div class="res-item"><span id="r_steel">0</span><small>حديد (طن)</small></div>
            <div class="res-item"><span id="r_cem">0</span><small>أسمنت (كيس)</small></div>
            <div class="res-item"><span id="r_sand">0</span><small>بطحاء (م³)</small></div>
            <div class="res-item"><span id="r_grav">0</span><small>كري (م³)</small></div>
            <div class="res-item"><span id="r_water">0</span><small>ماء (لتر)</small></div>
        </div>
        
        <button class="btn-copy-res" id="copy_btn_1" onclick="copyResults('concrete')">📋 نسخ تقرير الكميات</button>
    </div>

    <div class="ad-banner-clean">إعلان ممول</div>

    <div class="card">
        <h2>🧱 حاسبة طوب المباني</h2>
        <div class="grid-3">
            <div class="input-group">
                <label>إجمالي طول الجدران (م)</label>
                <input type="number" id="b_len" placeholder="0.00">
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>ارتفاع الجدار (م)</label>
                <input type="number" id="b_high" placeholder="مثلاً: 3">
            </div>
        </div>
        <button class="btn-calc" onclick="calcBricks()">احسب عدد الطوب</button>
        <div class="results-box" id="b_results">
            <div class="res-item"><span id="r_bricks">0</span><small>طوبة (20x40)</small></div>
            <div class="res-item"><span id="r_b_cem">0</span><small>أسمنت مونة (كيس)</small></div>
        </div>
        <button class="btn-copy-res" id="copy_btn_2" onclick="copyResults('bricks')">📋 نسخ النتائج</button>
    </div>
</div>

<footer>
    <p>© 2026 المنصة الهندسية المتكاملة | جميع الحقوق محفوظة</p>
</footer>

<script>
    function calcConcrete() {
        const a = parseFloat(document.getElementById('c_area').value);
        const t = parseFloat(document.getElementById('c_thick').value) / 100;
        const ty = document.getElementById('c_type').value;

        if(!a || !t) return alert("يرجى إكمال البيانات أولاً");

        let vol = a * t;
        let steel = vol * (ty === 'solid' ? 100 : 135) / 1000;
        let cem = vol * 7;
        let sand = vol * 0.4;
        let grav = vol * 0.8;

        document.getElementById('c_results').style.display = 'grid';
        document.getElementById('copy_btn_1').style.display = 'block';
        
        document.getElementById('r_vol').textContent = vol.toFixed(2);
        document.getElementById('r_steel').textContent = steel.toFixed(3);
        document.getElementById('r_cem').textContent = Math.ceil(cem);
        document.getElementById('r_sand').textContent = sand.toFixed(2);
        document.getElementById('r_grav').textContent = grav.toFixed(2);
        document.getElementById('r_water').textContent = Math.round(vol * 175);
    }

    function calcBricks() {
        const l = parseFloat(document.getElementById('b_len').value);
        const h = parseFloat(document.getElementById('b_high').value);
        if(!l || !h) return alert("يرجى إكمال البيانات");

        let area = l * h;
        let count = area * 12.5; 
        
        document.getElementById('b_results').style.display = 'grid';
        document.getElementById('copy_btn_2').style.display = 'block';
        document.getElementById('r_bricks').textContent = Math.ceil(count);
        document.getElementById('r_b_cem').textContent = Math.ceil((count/1000) * 12);
    }

    function copyResults(type) {
        let text = "";
        if(type === 'concrete') {
            text = `تقرير خرسانة: مساحة ${document.getElementById('c_area').value}م٢، خرسانة: ${document.getElementById('r_vol').textContent}م٣، حديد: ${document.getElementById('r_steel').textContent} طن.`;
        } else {
            text = `تقرير مباني: طوب: ${document.getElementById('r_bricks').textContent} حبة، أسمنت: ${document.getElementById('r_b_cem').textContent} كيس.`;
        }
        navigator.clipboard.writeText(text);
        alert("تم نسخ النتائج بنجاح!");
    }
<script src="https://pl28825044.effectivegatecpm.com/c3/eb/01/c3eb01a1312b0990825156562c460151.js"></script>
</body>
</html>
